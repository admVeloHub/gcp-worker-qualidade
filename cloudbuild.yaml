# VERSION: v1.4.0 | DATE: 2026-06-02 | AUTHOR: VeloHub Development Team
# CHANGELOG: v1.4.0 - deploy no serviço worker-qualidade (URL do observatório); não mais audio-worker
# CHANGELOG: v1.3.0 - min-instances 1 + no-cpu-throttling: sweep Pub/Sub e auto-retry sem depender de HTTP/observatório
# CHANGELOG: v1.2.0 - MONGO_ENV e OPENAI_API_KEY via Secret Manager; demais via --set-env-vars
# Cloud Build configuration para deploy do Worker no Cloud Run
#
# Secrets esperados: MONGO_ENV, OPENAI_API_KEY (ajuste nomes no GCP se diferentes)

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/audio-worker:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/audio-worker:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/audio-worker:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/audio-worker:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        gcloud run deploy worker-qualidade \
          --image "gcr.io/$PROJECT_ID/audio-worker:$SHORT_SHA" \
          --region us-east1 \
          --platform managed \
          --no-allow-unauthenticated \
          --port 8080 \
          --memory 2Gi \
          --cpu 2 \
          --timeout 3600 \
          --max-instances 5 \
          --min-instances 1 \
          --no-cpu-throttling \
          --update-env-vars=GCP_PROJECT_ID=velohub-471220,GCS_BUCKET_NAME=qualidade_audio_envio,PUBSUB_TOPIC_NAME=qualidade_audio_envio,PUBSUB_SUBSCRIPTION_NAME=upload_audio_qualidade,BACKEND_API_URL=https://backend-gcp-278491073220.us-east1.run.app,CONSOLE_ANALISES_DB=console_analises,GCP_LOCATION=us-central1,MAX_RETRIES=3,PORT=8080 \
          --update-secrets=MONGO_ENV=MONGO_ENV:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest

images:
  - 'gcr.io/$PROJECT_ID/audio-worker:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/audio-worker:latest'

timeout: '600s'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
